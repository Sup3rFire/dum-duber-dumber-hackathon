<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cut the Crap</title>
    <style>
      :root {
        --accent: #911eb4;
      }
      body {
        font-family: system-ui, sans-serif;
        width: 260px;
        margin: 0;
        padding: 16px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 2px;
      }
      .host {
        font-size: 12px;
        color: #666;
        margin-bottom: 14px;
        word-break: break-all;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .toggle-row span {
        font-size: 14px;
        font-weight: 600;
      }
      .switch {
        position: relative;
        width: 44px;
        height: 24px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: #ccc;
        border-radius: 24px;
        transition: 0.2s;
        cursor: pointer;
      }
      .slider::before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: 0.2s;
      }
      input:checked + .slider {
        background: var(--accent);
      }
      input:checked + .slider::before {
        transform: translateX(20px);
      }
      .stats {
        border-top: 1px solid #eee;
        padding-top: 12px;
      }
      .stat {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin: 6px 0;
      }
      .stat .val {
        font-weight: 700;
        color: var(--accent);
      }
      .stats-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #888;
        margin-bottom: 8px;
      }
      .footer {
        margin-top: 14px;
        font-size: 12px;
      }
      .footer a {
        color: var(--accent);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Cut the Crap</h1>
    <div class="host" id="host">—</div>

    <div class="toggle-row">
      <span>Decrappify this site</span>
      <label class="switch">
        <input type="checkbox" id="toggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="stats">
      <div class="stats-title">Lifetime</div>
      <div class="stat"><span>Words cut</span><span class="val" id="wordsCut">0</span></div>
      <div class="stat"><span>Pages processed</span><span class="val" id="pages">0</span></div>
      <div class="stat"><span>Overall shorter</span><span class="val" id="percent">0%</span></div>
    </div>

    <div class="footer">
      <a id="openOptions">Settings / API key</a>
    </div>

    <script src="lib/browser-polyfill.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
