<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cut the Crap — Settings</title>
    <style>
      :root {
        --accent: #f2d600;
        --crap: #7a4b21;
      }
      body {
        font-family: system-ui, sans-serif;
        max-width: 560px;
        margin: 40px auto;
        padding: 0 20px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 20px;
      }
      label {
        display: block;
        margin: 18px 0 6px;
        font-weight: 600;
        font-size: 14px;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        box-sizing: border-box;
        background: #fff;
      }
      .hint a {
        color: #1b6cd6;
      }
      .hint {
        font-size: 12px;
        color: #666;
        margin-top: 4px;
      }
      button {
        margin-top: 22px;
        padding: 10px 18px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #1a1a1a;
        font-size: 14px;
        cursor: pointer;
      }
      #status {
        margin-left: 12px;
        color: #2a8f3c;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>Cut the Crap — Settings</h1>

    <label for="provider">LLM provider</label>
    <select id="provider"></select>
    <div class="hint">
      Which model family transforms the page. Each provider keeps its own key and
      model, so you can switch freely.
    </div>

    <label for="apiKey"><span id="apiKeyLabel">API key</span></label>
    <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />
    <div class="hint">
      Stored locally in this browser only. Page text is sent to the selected
      provider when a site is switched on.
      <a id="apiKeyLink" target="_blank" rel="noopener" hidden>Get a key.</a>
    </div>

    <label for="model">Model</label>
    <input id="model" type="text" list="modelList" placeholder="model name" />
    <datalist id="modelList"></datalist>
    <div class="hint" id="modelHint">Any model this provider supports.</div>

    <div>
      <button id="save">Save</button>
      <span id="status"></span>
    </div>

    <script src="lib/browser-polyfill.js"></script>
    <script src="providers.js"></script>
    <script src="options.js"></script>
  </body>
</html>
