<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cut the Crap</title>
    <style>
      :root {
        --accent: #b59a00; /* decrapify (cut) */
        --crap: #7a4b21; /* crapify (pile on) */
        --ink: #1a1a1a;
        --muted: #666;
      }
      body {
        font-family: system-ui, sans-serif;
        width: 288px;
        margin: 0;
        padding: 16px;
        color: var(--ink);
      }
      h1 {
        font-size: 15px;
        margin: 0 0 2px;
      }
      .host {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 16px;
        word-break: break-all;
      }

      /* ---- mode selector ---- */
      .mode-selector {
        border: 0;
        margin: 0;
        padding: 0;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .mode-options {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        overflow: hidden;
        border: 1px solid #b7b7b7;
        border-radius: 4px;
      }
      .mode-options input {
        position: absolute;
        opacity: 0;
      }
      .mode-option {
        min-width: 0;
        padding: 8px 4px;
        border-left: 1px solid #b7b7b7;
        color: var(--muted);
        cursor: pointer;
        font-size: 11px;
        font-weight: 700;
        line-height: 1;
        text-align: center;
        transition: background-color 120ms ease, color 120ms ease;
        user-select: none;
      }
      .mode-options input:first-child + .mode-option {
        border-left: 0;
      }
      #modeCrap:checked + .mode-option {
        background: var(--crap);
        color: #fff;
      }
      #modeNormal:checked + .mode-option {
        background: var(--ink);
        color: #fff;
      }
      #modeDecrap:checked + .mode-option {
        background: var(--accent);
        color: var(--ink);
      }
      .mode-options input:focus-visible + .mode-option {
        position: relative;
        outline: 2px solid #3b78e7;
        outline-offset: -2px;
        z-index: 1;
      }
      .mode-options input:disabled + .mode-option {
        cursor: not-allowed;
        opacity: 0.45;
      }

      /* ---- stats ---- */
      .stats {
        border-top: 1px solid #eee;
        padding-top: 12px;
        margin-top: 16px;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }
      .stat {
        min-width: 0;
        color: var(--muted);
        font-size: 10px;
        line-height: 1.25;
        text-align: center;
      }
      .stat .val {
        display: block;
        margin-bottom: 4px;
        color: var(--ink);
        font-size: 28px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.04em;
        line-height: 1;
        white-space: nowrap;
      }
      /* All three values share one size tier, chosen from whichever value is
         currently the widest, so they read as a proportional set instead of
         one giant number beside two shrunken ones. */
      .stat-grid.tier-md .val {
        font-size: 21px;
        letter-spacing: -0.05em;
      }
      .stat-grid.tier-sm .val {
        font-size: 16px;
        letter-spacing: -0.06em;
      }
      .stat .cut {
        color: var(--accent);
      }
      .stat .add {
        color: var(--crap);
      }
      .stats-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #888;
        margin-bottom: 8px;
      }
      .footer {
        margin-top: 14px;
        font-size: 12px;
      }
      .footer a {
        color: var(--accent);
        cursor: pointer;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>Cut the Crap</h1>
    <div class="host" id="host">—</div>

    <fieldset class="mode-selector" id="modeSelector">
      <legend class="sr-only">Mode</legend>
      <div class="mode-options">
        <input type="radio" id="modeCrap" name="mode" value="crap" />
        <label class="mode-option" for="modeCrap">Crapify</label>
        <input type="radio" id="modeNormal" name="mode" value="off" checked />
        <label class="mode-option" for="modeNormal">Normal</label>
        <input type="radio" id="modeDecrap" name="mode" value="decrap" />
        <label class="mode-option" for="modeDecrap">Decrapify</label>
      </div>
    </fieldset>

    <div class="stats">
      <div class="stats-title">Lifetime</div>
      <div class="stat-grid">
        <div class="stat"><span class="val cut" id="wordsCut">0</span><span>Words cut</span></div>
        <div class="stat"><span class="val add" id="wordsAdded">0</span><span>Words piled on</span></div>
        <div class="stat"><span class="val" id="pages">0</span><span>Pages processed</span></div>
      </div>
    </div>

    <div class="footer">
      <a id="openOptions">Settings</a>
      · <a href="https://cutthecrap.superfi.re/privacy" target="_blank" rel="noopener">Privacy</a>
    </div>

    <script src="lib/browser-polyfill.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
